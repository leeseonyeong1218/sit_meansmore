      html,

        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: sans-serif;
      }
      /* ─── 배너 (배경 검정, 이미지 흰색) ─── */
      .banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 60px;
        height: 52px;
        background: #000;
        position: relative;
        z-index: 10;
        border-bottom: 10px solid #000;
      }
      .banner img {
        height: 100%;
        width: auto;
        filter: brightness(0) invert(1);
      }
      .logo-collection,
      .logo-left {
        transform: scale(0.8);
        height: 15px;
        margin-top: 25px;
        margin-left: 40px;
      }
      .logo-site,
      .logo-center {
        transform: scale(1.4);
        height: 15px;
        margin-top: 25px;
        margin-left: 175px;
      }
      .nav-right {
        display: flex;
        gap: 75px;
      }
      .nav-item {
        transform: scale(0.8);
        height: 15px;
        margin-top: 45px;
      }
      .nav-item.ch3 {
        transform: scale(0.31);
        height: 38px;
        margin-top: 33px;
      }

      /* 화면 전체 스크린 */
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transition: opacity 2.5s ease;
      }
      .hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* screen1 에 캐러셀 */
      #screen1 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(0, 0, 0, 1) 80%
        );
        z-index: 2;
      }
      #screen1 .banner {
        position: relative;
      }
      /* 캐러셀 영역 (헤더 제외한 전 높이) */
      .carousel {
        position: absolute;
        top: 52px;
        left: 0;
        width: 100%;
        height: calc(100% - 52px);
        pointer-events: auto;
        overflow: visible;
      }

      /* 3D 캐러셀 스타일 */
      :root {
        --items: 20;
      }
      .carousel-item {
        --width: clamp(150px, 30vw, 300px);
        --height: clamp(200px, 40vw, 400px);
        --x: calc(var(--active) * 1300%);
        --y: calc(var(--active) * 200%);
        --rot: calc(var(--active) * 120deg);

        position: absolute;
        z-index: var(--zIndex);
        width: var(--width);
        height: var(--height);
        top: 50%;
        left: 50%;
        margin: calc(var(--height) * -0.5) 0 0 calc(var(--width) * -0.5);
        border-radius: 10px;
        overflow: hidden;
        transform-origin: 0% 100%;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
        background: #000;
        transform: translate3d(var(--x), var(--y), 0) rotate(var(--rot));

        transition: transform 0.8s cubic-bezier(0, 0.02, 0, 1), filter 0.8s ease;

        filter: blur(4px) brightness(0.7);
      }
      .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        loading: lazy;
        decoding: async;
      }
      #screen2 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(107, 107, 107, 1) 0%,
          rgb(0, 0, 0) 100%
        );
        padding: 60px 40px;
        box-sizing: border-box;
        color: white;

        display: flex;
        flex-direction: column;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

        justify-content: center;
        gap: 60px;
        padding-top: 60px;
        max-width: 1200px;

      button.learn-more {
        position: relative;
        display: inline-block;
        width: 12rem;
        height: auto;
        cursor: pointer;
        outline: none;
        border: 0;
        background: transparent;
        padding: 0;

      button.learn-more .circle {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: relative;
        display: block;
        margin: 0;
        width: 3rem;
        height: 3rem;
        background: #000000;
        border-radius: 1.625rem;
      }

      button.learn-more .circle .icon {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: absolute;
        top: 0;
        bottom: 0;
        margin: auto;
        background: #fff;
      }

      button.learn-more .circle .icon.arrow {
        left: 0.625rem;
        width: 1.125rem;
        height: 0.125rem;
        background: none;
      }

      button.learn-more .circle .icon.arrow::before {
        content: "";
        position: absolute;
        top: -0.25rem;
        right: 0.0625rem;
        width: 0.625rem;
        height: 0.625rem;
        border-top: 0.125rem solid #fff;
        border-right: 0.125rem solid #fff;
        transform: rotate(45deg);
      }

      button.learn-more .button-text {

        right: 0;

      button.learn-more:hover .circle {

        transform: translate(1rem, 0);
        background: #fff;
      }

      button.learn-more:hover .button-text {

      }
    </style>

    <script>
      const $items = document.querySelectorAll(".carousel-item");
      document.documentElement.style.setProperty("--items", $items.length);
      let progress = 0,
        startX = 0,
        active = 0,
        isDown = false;
      const speedWheel = 0.02,
        speedDrag = -0.1;
      // ① 클릭된 인덱스의 메타데이터
      const data = [
        {
          title: "Harp Chair",
          year: "1968",
          company:
            "Jørgen Hovelskov · Christensen & Larsen Mobelværk → Koch Design",
          desc: "하프 의자는 바이킹 선박의 뱃머리에서 영감을 얻어 로프 짜임 등판을 구현했다. 깃발용 밧줄이 유연하게 지탱하며 앉을 때마다 미세 흔들림을 선사한다. 이 작품을 통해 목재 틀과 로프의 대비가 시각적 긴장을 강조하는 동시에, 모더니즘 조각과 기능적 가구의 경계를 허문다. 요르겐 호벨스코프의 초기 대표작으로, 1968년 첫 제작 후 2010년 Koch Design에 의해 복각되어 오늘날까지 사랑받고 있다. 긴장감과 유연함을 동시에 담아낸 하프 의자는, 착석자가 스스로 경험을 조율하도록 촉구하는 참여적 디자인 철학을 제시한다.",
        },
        {
          title: "Wiggle Side Chair",
          year: "1972",
          company: "Frank Gehry · Jack Brogan → Chiru → Vitra",
          desc: "골판지를 겹겹이 쌓아 흐르는 곡선을 만들었으나 앉으면 각 층마다 압박감이 달리 전달된다. 체중에 따라 빛이 스며들며 내면의 불안정함을 드러낸다. 편안함의 환상을 깨뜨리며 산업적 완전성에 균열을 내는 이 의자는 형태와 감각의 모순을 시각화한다. 프랭크 게리의 건축적 해석을 가구로 옮긴 실험적 작품으로, 1982년 Chiru를 거쳐 Vitra에서 재생산되며 전 세계에 영향력을 미치고 있다. 위글 사이드 체어는 ‘정해진 형태’와 ‘가변적 착석감’ 사이를 가로지르며 사용자의 신체 기억을 재구성하는 매개체가 된다.",
        },
        {
          title: "Blow Chair",
          year: "1967",
          company:
            "Gianantonio De Pas · Donato D’Urbino · Paolo Lomazzi · Zanotta",
          desc: "PVC 실린더를 고주파 용접해 만든 공기 주입 의자로, 팽창과 수축이 반복되며 안정감과 불안정함의 간극을 체험하게 한다. 가정용 수리 키트를 동봉해 소비자의 직접 수리를 유도했다. 미쉐린 타이어 캐릭터에서 착안한 익살스러운 실루엣으로 1960년대 디자인 아이콘이 되었으며, 대량생산 가구의 새로운 가능성을 제시했다. DDL 스튜디오의 첫 협업작으로 출발해 2012년까지 장수 생산되며 현대 팝 디자인의 이정표로 남았다. 공기라는 매개체를 통해 ‘일시적 안정’의 경험과 ‘필연적 쇠퇴’의 서사를 동시에 드러내는 사회적 장치로 기능한다.",
        },
        {
          title: "Tube Chair",
          year: "1970",
          company: "Joe Colombo · Flexform → Cappellini",
          desc: "폴리우레탄 튜브 네 개를 동심원으로 묶은 가변형 구조로, 사용자의 조립에 따라 형태와 착석감이 변화한다. 참여적 퍼포먼스로서 가구의 역할을 재정의한다. 팝아트적 컬러와 자유로운 조합이 특징이며, 구조적 연속성 개념을 구현한 혁신적 디자인으로 평가받는다. 원형 Flexform 버전을 거쳐 2016년 Cappellini가 복각하며 팝아트 가구의 상징으로 부활시켰다. 튜브 의자는 제작 과정 자체를 드러내고, 소비자와 디자이너의 경계를 흐리는 개방적 예술 실험이기도 하다.",
        },
        {
          title: "S Chair",
          year: "1987",
          company: "Tom Dixon · limited edition → Cappellini",
          desc: "S자형 금속 프레임에 골풀을 엮어 인체와 유기적 곡선을 드러낸다. 앉을 때마다 미묘한 비틀림이 체중을 분산시키며 ‘자연스러운 편안함’의 신화를 해체한다. 금속과 천연 섬유의 대비가 촉감적 긴장을 만들어내며, 기계적 완벽함과 유기적 불완전성의 공존을 묻는다. 톰 딕슨의 초기 재활용 강철 작품 중 하나로, 1987년 런던 스튜디오에서 한정 생산되었다가 이후 Cappellini를 통해 벨벳·가죽 버전으로 재출시되었다. S 의자는 몸과 표면 사이의 거리를 재정의하며, 착석 행위를 성찰적 경험으로 전환한다.",
        },

        {
          title: ".03 Chair",
          year: "1998",
          company: "Maarten van Severen · Vitra",

      // ③ 화면 전환 함수
      function showScreen(n) {
        document.getElementById("screen1").classList.toggle("hidden", n !== 1);
        document.getElementById("screen2").classList.toggle("hidden", n !== 2);
      }

      // ④ 상세보기 함수
      function showDetail(idx) {
        const info = data[idx];
        const imgSrc = $items[idx].querySelector("img").src;
        document.getElementById("detail-image").src = imgSrc;
        document.getElementById("detail-title").textContent = info.title;
        document.getElementById("detail-year").textContent = info.year;
        document.getElementById("detail-company").textContent = info.company;
        document.getElementById("detail-desc").textContent = info.desc;
        showScreen(2); // 화면 전환
      }

      function getZ(arr, i) {
        return arr.map((_, j) =>
          j === i ? arr.length : arr.length - Math.abs(i - j)
        );
      }

      function display(it, i, act) {
        const z = getZ([...$items], act)[i];
        it.style.setProperty("--zIndex", z);
        it.style.setProperty("--active", (i - act) / $items.length);
        // 필터 적용: 중앙만 선명하게, 나머지는 뿌옇게
        it.style.filter = i === act ? "none" : "blur(4px) brightness(0.7)";
      }

      function animate() {
        progress = Math.max(0, Math.min(progress, 100));
        active = Math.floor((progress / 100) * ($items.length - 1));
        $items.forEach((it, i) => display(it, i, active));

        // ★ Learn More 버튼 표시 로직 추가
        const learnMoreBtn = document.getElementById("learn-more-container");
        const screen1Visible = !document
          .getElementById("screen1")
          .classList.contains("hidden");

        if (screen1Visible && active === 19) {
          learnMoreBtn.classList.remove("hidden");
        } else {
          learnMoreBtn.classList.add("hidden");
        }
      }

      (function loop() {
        animate();
        requestAnimationFrame(loop);
      })();

      $items.forEach((it, i) => {
        it.addEventListener("click", () => {
          if (i === active) {
            showDetail(i);
          } else {
            progress = (i / $items.length) * 100 + 10;
          }
        });
      });

      document.addEventListener(
        "wheel",
        (e) => (progress += e.deltaY * speedWheel),
        { passive: true }
      );
      document.addEventListener("mousedown", (e) => {
        isDown = true;
        startX = e.clientX;
      });
      document.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        progress += (e.clientX - startX) * speedDrag;
        startX = e.clientX;
      });
      document.addEventListener("mouseup", (_) => (isDown = false));
      document.addEventListener(
        "touchstart",
        (e) => {
          isDown = true;
          startX = e.touches[0].clientX;
        },
        { passive: true }
      );
      document.addEventListener(
        "touchmove",
        (e) => {
          if (!isDown) return;
          progress += (e.touches[0].clientX - startX) * speedDrag;
          startX = e.touches[0].clientX;
        },
        { passive: true }
      );
      document.addEventListener("touchend", (_) => (isDown = false));
    </script>
    <script>
      const text =
        '"Uncomfortable Chairs 전시는 기능보다 철학과 태도를 우선시한다.    이곳에서 의자는 형태의 긴장감을 통해 세상의 변화를 보여주는 수단이다.       각 의자에는 디자이너가 바라본 미학이 담겨 있으며, 화면 안에서 불편함이    하나의 개성으로 표현된다.의자는 더 이상 앉는 도구가 아니라 우리를 사유하게 만드는 조형적 도발이다.디자이너의 철학이 우선시되는 의자는 ‘우리는 왜     불편함을 선택하는가?’라는 질문을 남긴다.';
      let idx = 0;
      let typedDone = false;

      function typeWriter() {
        if (idx < text.length) {
          document.getElementById("typed-text").textContent += text.charAt(idx);
          idx++;
          setTimeout(typeWriter, 50);
        } else {
          typedDone = true;
          document.getElementById("typed-text").classList.add("cursor");
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        typeWriter();

        document.getElementById("screen0").addEventListener("click", () => {
          document.getElementById("screen0").classList.add("hidden");
          document.getElementById("screen1").classList.remove("hidden");
        });
      });
    </script>
