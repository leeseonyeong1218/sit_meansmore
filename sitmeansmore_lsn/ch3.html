    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: sans-serif;
      }
      /* ─── 배너 (배경 검정, 이미지 흰색) ─── */
      .banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 60px;
        height: 52px;
        background: #000;
        position: relative;
        z-index: 10;
        border-bottom: 10px solid #000;
      }
      .banner img {
        height: 100%;
        width: auto;
        filter: brightness(0) invert(1);
      }
      .logo-collection,
      .logo-left {
        transform: scale(0.8);
        height: 15px;
        margin-top: 25px;
        margin-left: 40px;
      }
      .logo-site,
      .logo-center {
        transform: scale(1.4);
        height: 15px;
        margin-top: 25px;
        margin-left: 175px;
      }
      .nav-right {
        display: flex;
        gap: 75px;
      }
      .nav-item {
        transform: scale(0.8);
        height: 15px;
        margin-top: 45px;
      }
      .nav-item.ch3 {
        transform: scale(0.31);
        height: 38px;
        margin-top: 33px;
      }

      /* 화면 전체 스크린 */
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transition: opacity 2.5s ease;
      }
      .hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* screen1 에 캐러셀 */
      #screen1 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(0, 0, 0, 1) 80%
        );
        z-index: 2;
      }
      #screen1 .banner {
        position: relative;
      }
      /* 캐러셀 영역 (헤더 제외한 전 높이) */
      .carousel {
        position: absolute;
        top: 52px;
        left: 0;
        width: 100%;
        height: calc(100% - 52px);
        pointer-events: auto;
        overflow: visible;
      }

      /* 3D 캐러셀 스타일 */
      :root {
        --items: 20;
      }
      .carousel-item {
        --width: clamp(150px, 30vw, 300px);
        --height: clamp(200px, 40vw, 400px);
        --x: calc(var(--active) * 1300%);
        --y: calc(var(--active) * 200%);
        --rot: calc(var(--active) * 120deg);

        position: absolute;
        z-index: var(--zIndex);
        width: var(--width);
        height: var(--height);
        top: 50%;
        left: 50%;
        margin: calc(var(--height) * -0.5) 0 0 calc(var(--width) * -0.5);
        border-radius: 10px;
        overflow: hidden;
        transform-origin: 0% 100%;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
        background: #000;
        transform: translate3d(var(--x), var(--y), 0) rotate(var(--rot));

        transition: transform 0.8s cubic-bezier(0, 0.02, 0, 1), filter 0.8s ease;

        filter: blur(4px) brightness(0.7);
      }
      .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        loading: lazy;
        decoding: async;
      }
      #screen2 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(107, 107, 107, 1) 0%,
          rgb(0, 0, 0) 100%
        );
        padding: 60px 40px;
        box-sizing: border-box;
        color: white;

        display: flex;
        flex-direction: column;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .detail-container {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 60px;
        padding-top: 60px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .detail-img {
        flex: 0 0 clamp(200px, 30vw, 360px);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
      }

      .detail-img img {
        width: 100%;
        height: auto;
        display: block;
      }

      .detail-text {
        max-width: 400px;
      }

      .detail-text h1 {
        font-family: "Bodoni Moda", serif;

        margin: 0;
        line-height: 1.1;
        margin-top: 10px;

      }

      .detail-text .meta {

        margin-top: 10px;
      }

      .detail-text p {

      .btn-back {

        top: 40px;
        left: 40px;

        font-size: 1rem;
        cursor: pointer;
      }

      #screen0 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(107, 107, 107, 1) 0%,
          rgb(0, 0, 0) 100%
        );
        color: white;
        z-index: 3;
        display: flex;
        flex-direction: column;
      }

      .ch1-content {
        flex: 1;

        align-items: center;

      }

      .text-wrap {

      .text-wrap h1 {

      .text-wrap p {

        max-width: 100%;

        max-width: 600px;
        text-align: left;
        margin-left: 100px;
      }
      @import url("https://fonts.googleapis.com/css?family=Mukta:700");

      body {
        font-family: "Mukta", sans-serif;
        background: #f3f8fa;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;

      }

      #learn-more-container {
        position: fixed;
        bottom: 40px;
        right: 40px;
        z-index: 999;
      }

      button.learn-more {
        position: relative;
        display: inline-block;
        width: 12rem;
        height: auto;
        cursor: pointer;
        outline: none;
        border: 0;
        background: transparent;
        padding: 0;
        font-size: inherit;
        font-family: inherit;
      }

      button.learn-more .circle {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: relative;
        display: block;
        margin: 0;
        width: 3rem;
        height: 3rem;
        background: #000000;
        border-radius: 1.625rem;
      }

      button.learn-more .circle .icon {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: absolute;
        top: 0;
        bottom: 0;
        margin: auto;
        background: #fff;
      }

      button.learn-more .circle .icon.arrow {
        left: 0.625rem;
        width: 1.125rem;
        height: 0.125rem;
        background: none;
      }

      button.learn-more .circle .icon.arrow::before {
        content: "";
        position: absolute;
        top: -0.25rem;
        right: 0.0625rem;
        width: 0.625rem;
        height: 0.625rem;
        border-top: 0.125rem solid #fff;
        border-right: 0.125rem solid #fff;
        transform: rotate(45deg);
      }

      button.learn-more .button-text {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: absolute;
        top: 1.1rem;
        left: 0;
        right: 0;
        bottom: 0;
        padding: rem 0;
        margin: 0 0 0 1.85rem;
        color: #ffffff;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
      }

      button.learn-more:hover .circle {
        width: 100%;
      }

      button.learn-more:hover .circle .icon.arrow {
        transform: translate(1rem, 0);
        background: #fff;
      }

      button.learn-more:hover .button-text {
        color: #fff;
      }
    </style>
  </head>

    <script>
      const $items = document.querySelectorAll(".carousel-item");
      document.documentElement.style.setProperty("--items", $items.length);
      let progress = 0,
        startX = 0,
        active = 0,
        isDown = false;
      const speedWheel = 0.02,
        speedDrag = -0.1;
      // ① 클릭된 인덱스의 메타데이터
      const data = [
        {
          title: "First Chair",
          year: "1983",
          company:
            "Jørgen Hovelskov · Christensen & Larsen Mobelværk → Koch Design",
          desc: "First Chair는 튜블러 스틸 프레임 위에 래커 칠한 자작나무 합판 시트를 장착해 사람 상반신 윤곽을 형상화한 조각적 가구다. 가벼운 무게와 휴대 가능한 구조 덕분에 전시장 어디로든 쉽게 이동할 수 있으며, 사용자가 직접 앉음으로써 작품의 의미가 완성된다. 매끄러운 래커 표면과 차가운 메탈의 대비가 내면의 긴장과 반항적 에너지를 동시에 환기한다. 원래 Memphis Milano에서 한정 생산된 후 Artemide의 라이선스로 재생산되며 시대를 초월한 디자인 아이콘으로 인정받는다. 전시에서는 모던 권위를 해체하는 매니페스토로서 일상 가구가 개인의 정체성 퍼포먼스로 전환되는 과정을 드러낸다.",
        },
        {
          title: "Sketch Chair",
          year: "2005",
          company: "Frank Gehry · Jack Brogan → Chiru → Vitra",
          desc: "Sketch Chair는 모션 캡처로 기록된 손의 궤적 데이터를 3D 프린팅한 세라믹 강화 수지 그물망으로 직조해 ‘움직임의 드로잉’을 물리적 구조로 전환한 작품이다. 그물망은 늘어났다 팽팽해졌다 하며 동적 변형을 반복해 ‘창조적 참여’의 순간을 온몸으로 체감하게 만든다. 스톡홀름과 밀라노에서 단 세 점만 한정 공개되어 기술과 신체가 협업하는 퍼포먼스 장치로 평가받는다. 사용자의 움직임이 곧 작품의 형상이 되어 흔적으로 남는 과정을 체험하는 동안, 관객은 자신만의 드로잉을 완성하는 창작자가 된다. 전시에서는 제작·사용·참여가 일체화된 장치로서 가구가 공동 창작의 무대로 기능함을 보여 준다.",
        },
        {
          title: "Family Chairs",
          year: "2010",
          company:
            "Gianantonio De Pas · Donato D’Urbino · Paolo Lomazzi · Zanotta",
          desc: "Family Chairs는 Ø4mm 강철 메쉬로 짜인 다섯 개의 의자가 각기 다른 등받이 높이와 각도로 배치되어 가족적 연대와 개별성 사이의 미묘한 균형을 시각화한다. 사용자가 앉을 때마다 메쉬가 미세하게 변형되어 체온과 압력을 기록하므로 살아 있는 존재의 참여를 증명하듯 작품에 지속적으로 흔적을 남긴다. 2010년 밀라노 가구 박람회에서 첫 공개된 이후 Living Divani가 제작을 이어왔으며, CNC 가공 기술로 구현한 가벼운 구조미와 사회적 서사가 결합된 대표작으로 인정받는다. 전시 공간에서는 이 의자들이 조각된 군집처럼 관객을 둘러싸며 개별이 집단 안에서 어떻게 형태를 유지하고 변화하는지 성찰하도록 유도한다.",
        },
        {
          title: "T1 Chair",
          year: "2016",
          company: "Joe Colombo · Flexform → Cappellini",
          desc: "T1 Chair는 단풍나무 또는 물푸레나무로 제작한 좌판과 다리에 투명 우레탄 코팅을 입히고, 컬러 파우더 코팅된 S자형 스프링강을 등받이 지지대로 활용해 간결하지만 장난기 어린 움직임을 구현한 디자인이다. 스프링강은 사용자의 체중 변화에 따라 최대 15°까지 부드럽게 흔들려 스스로의 리듬을 감각적으로 체험하게 만든다. Maruni Wood Industry의 3D 목재 가공 기술로 완성된 이 의자는 따뜻한 나무와 차가운 강철의 대비를 통해 일상의 긴장과 완화를 동시에 경험하도록 한다. 작은 구조적 변화가 개인의 감각 경험을 증폭하는 과정을 생생하게 보여 주며, 미세 조정이 만드는 큰 차이를 체험하도록 초대한다.",
        },
        {
          title: "Bambi Chair",
          year: "2015",
          company: "Takeshi Sawada · Elements Optimal",
          desc: "Bambi Chair는 발굽을 연상시키는 나무 다리 위에 얼룩진 인조 모피 시트를 얹고 사슴 뿔을 은유한 곡선 등받이를 결합해 동심과 상상력을 자극하는 페르소나 장치를 완성한다. 직접적 형상을 배제한 은유적 단서를 통해 관객은 스스로 어린 시절 기억을 투영하며 자신만의 동화 공간을 떠올리게 만든다. Elements Optimal이 소량 생산한 이 의자는 서사적 몰입 경험을 제공하며, 작은 크기에도 불구하고 강력한 감각적 힘을 발휘한다. 전시에서는 관객이 앉아 동화 속 주인공이 되는 경험을 통해 공간과 기억의 경계를 탐색하도록 초대한다.",
        },
        {
          title: "Scissor Chair",
          year: "1968",
          company: "Maarten van Severen · Vitra",

      // ③ 화면 전환 함수
      function showScreen(n) {
        document.getElementById("screen1").classList.toggle("hidden", n !== 1);
        document.getElementById("screen2").classList.toggle("hidden", n !== 2);
      }

      // ④ 상세보기 함수
      function showDetail(idx) {
        const info = data[idx];
        const imgSrc = $items[idx].querySelector("img").src;
        document.getElementById("detail-image").src = imgSrc;
        document.getElementById("detail-title").textContent = info.title;
        document.getElementById("detail-year").textContent = info.year;
        document.getElementById("detail-company").textContent = info.company;
        document.getElementById("detail-desc").textContent = info.desc;
        showScreen(2); // 화면 전환
      }

      function getZ(arr, i) {
        return arr.map((_, j) =>
          j === i ? arr.length : arr.length - Math.abs(i - j)
        );
      }

      function display(it, i, act) {
        const z = getZ([...$items], act)[i];
        it.style.setProperty("--zIndex", z);
        it.style.setProperty("--active", (i - act) / $items.length);
        // 필터 적용: 중앙만 선명하게, 나머지는 뿌옇게
        it.style.filter = i === act ? "none" : "blur(4px) brightness(0.7)";
      }

      function animate() {
        progress = Math.max(0, Math.min(progress, 100));
        active = Math.floor((progress / 100) * ($items.length - 1));
        $items.forEach((it, i) => display(it, i, active));

        // ★ Learn More 버튼 표시 로직 추가
        const learnMoreBtn = document.getElementById("learn-more-container");
        const screen1Visible = !document
          .getElementById("screen1")
          .classList.contains("hidden");

        if (screen1Visible && active === 19) {
          learnMoreBtn.classList.remove("hidden");
        } else {
          learnMoreBtn.classList.add("hidden");
        }
      }

      (function loop() {
        animate();
        requestAnimationFrame(loop);
      })();

      $items.forEach((it, i) => {
        it.addEventListener("click", () => {
          if (i === active) {
            showDetail(i);
          } else {
            progress = (i / $items.length) * 100 + 10;
          }
        });
      });

      document.addEventListener(
        "wheel",
        (e) => (progress += e.deltaY * speedWheel),
        { passive: true }
      );
      document.addEventListener("mousedown", (e) => {
        isDown = true;
        startX = e.clientX;
      });
      document.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        progress += (e.clientX - startX) * speedDrag;
        startX = e.clientX;
      });
      document.addEventListener("mouseup", (_) => (isDown = false));
      document.addEventListener(
        "touchstart",
        (e) => {
          isDown = true;
          startX = e.touches[0].clientX;
        },
        { passive: true }
      );
      document.addEventListener(
        "touchmove",
        (e) => {
          if (!isDown) return;
          progress += (e.touches[0].clientX - startX) * speedDrag;
          startX = e.touches[0].clientX;
        },
        { passive: true }
      );
      document.addEventListener("touchend", (_) => (isDown = false));
    </script>
    <script>
      const text =
        '"Chairs as Identity전시의 의자들은 사용자의 개성을 드러내는 디자인  요소로 구성된다. 디자이너는 소재·색상·형태마다 특정 키워드를 부여해 ‘나’를 설명하는 시각적 단서를 심는다. 의자는 더 이상 앉기 위한 도구가 아니라,    퍼스널 브랜딩 시대의 ‘나를 보여주는 아바타’로 기능한다. 전시는 의자라는   오브제를 통해 정체성 표현의 지평을 확장하며, 관객 스스로 자신의 개성을    하나의 물리적 언어로 재구성하도록 한다.';
      let idx = 0;
      let typedDone = false;

      function typeWriter() {
        if (idx < text.length) {
          document.getElementById("typed-text").textContent += text.charAt(idx);
          idx++;
          setTimeout(typeWriter, 50);
        } else {
          typedDone = true;
          document.getElementById("typed-text").classList.add("cursor");
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        typeWriter();

        document.getElementById("screen0").addEventListener("click", () => {
          document.getElementById("screen0").classList.add("hidden");
          document.getElementById("screen1").classList.remove("hidden");
        });
      });
    </script>
    <script>
      document
        .getElementById("go-to-collection")
        .addEventListener("click", (e) => {
          e.preventDefault(); // 혹시라도 form submit 방지
          window.location.href = "collection.html";
        });
    </script>
