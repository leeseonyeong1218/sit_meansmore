      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: sans-serif;
      }
      /* ─── 배너 (배경 검정, 이미지 흰색) ─── */
      .banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 60px;
        height: 52px;
        background: #000;
        position: relative;
        z-index: 10;
        border-bottom: 10px solid #000;
      }
      .banner img {
        height: 100%;
        width: auto;
        filter: brightness(0) invert(1);
      }
      .logo-collection,
      .logo-left {
        transform: scale(0.8);
        height: 15px;
        margin-top: 25px;
        margin-left: 40px;
      }
      .logo-site,
      .logo-center {
        transform: scale(1.4);
        height: 15px;
        margin-top: 25px;
        margin-left: 175px;
      }
      .nav-right {
        display: flex;
        gap: 75px;
      }
      .nav-item {
        transform: scale(0.8);
        height: 15px;
        margin-top: 45px;
      }
      .nav-item.ch3 {
        transform: scale(0.31);
        height: 38px;
        margin-top: 33px;
      }

      /* 화면 전체 스크린 */
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transition: opacity 2.5s ease;
      }
      .hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* screen1 에 캐러셀 */
      #screen1 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(0, 0, 0, 1) 80%
        );
        z-index: 2;
      }
      #screen1 .banner {
        position: relative;
      }
      /* 캐러셀 영역 (헤더 제외한 전 높이) */
      .carousel {
        position: absolute;
        top: 52px;
        left: 0;
        width: 100%;
        height: calc(100% - 52px);
        pointer-events: auto;
        overflow: visible;
      }

      /* 3D 캐러셀 스타일 */
      :root {
        --items: 20;
      }
      .carousel-item {
        --width: clamp(150px, 30vw, 300px);
        --height: clamp(200px, 40vw, 400px);
        --x: calc(var(--active) * 1300%);
        --y: calc(var(--active) * 200%);
        --rot: calc(var(--active) * 120deg);

        position: absolute;
        z-index: var(--zIndex);
        width: var(--width);
        height: var(--height);
        top: 50%;
        left: 50%;
        margin: calc(var(--height) * -0.5) 0 0 calc(var(--width) * -0.5);
        border-radius: 0;
        overflow: hidden;
        transform-origin: 0% 100%;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
        background: #000;
        transform: translate3d(var(--x), var(--y), 0) rotate(var(--rot));

        transition: transform 0.8s cubic-bezier(0, 0.02, 0, 1), filter 0.8s ease;

        filter: blur(4px) brightness(0.7);
      }
      .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        loading: lazy;
        decoding: async;
      }
      #screen2 {
        background: radial-gradient(
          circle at 50% 160%,
          rgba(107, 107, 107, 1) 0%,
          rgb(0, 0, 0) 100%
        );
        padding: 60px 40px;
        box-sizing: border-box;
        color: white;

        display: flex;
        flex-direction: column;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .detail-container {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 60px;
        padding-top: 60px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .detail-img {
        flex: 0 0 clamp(200px, 30vw, 360px);
        border-radius: 0;
        overflow: hidden;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);

      .btn-back {

      }

      @import url("https://fonts.googleapis.com/css?family=Mukta:700");

      body {

        background: #f3f8fa;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;

      #learn-more-container {
        position: fixed;
        bottom: 40px;

      button.learn-more {
        position: relative;
        display: inline-block;
        width: 12rem;
        height: auto;
        cursor: pointer;
        outline: none;
        border: 0;
        background: transparent;
        padding: 0;
        font-size: inherit;
        font-family: inherit;
      }

      button.learn-more .circle {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: relative;
        display: block;
        margin: 0;
        width: 3rem;
        height: 3rem;
        background: #000000;
        border-radius: 1.625rem;
      }

      button.learn-more .circle .icon {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: absolute;
        top: 0;
        bottom: 0;
        margin: auto;
        background: #fff;
      }

      button.learn-more .circle .icon.arrow {
        left: 0.625rem;
        width: 1.125rem;
        height: 0.125rem;
        background: none;
      }

      button.learn-more .circle .icon.arrow::before {
        content: "";
        position: absolute;
        top: -0.25rem;
        right: 0.0625rem;
        width: 0.625rem;
        height: 0.625rem;
        border-top: 0.125rem solid #fff;
        border-right: 0.125rem solid #fff;
        transform: rotate(45deg);
      }

      button.learn-more .button-text {
        transition: all 0.45s cubic-bezier(0.65, 0, 0.076, 1);
        position: absolute;
        top: 1.1rem;
        left: 0;
        right: 0;
        bottom: 0;
        padding: rem 0;
        margin: 0 0 0 1.85rem;
        color: #ffffff;
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
      }

      button.learn-more:hover .circle {
        width: 100%;
      }

      button.learn-more:hover .circle .icon.arrow {
        transform: translate(1rem, 0);
        background: #fff;
      }

      button.learn-more:hover .button-text {
        color: #fff;
      }
    </style>

    <script>
      const $items = document.querySelectorAll(".carousel-item");
      document.documentElement.style.setProperty("--items", $items.length);
      let progress = 0,
        startX = 0,
        active = 0,
        isDown = false;
      const speedWheel = 0.02,
        speedDrag = -0.1;
      // ① 클릭된 인덱스의 메타데이터
      const data = [
        {
          title: "Mies Chair",
          year: "1989",
          company: "Archizoom Associati",
          desc: "Archizoom Associati가 Poltronova를 위해 리이슈한 Mies Chair는 크롬 지지대 사이에 한 장의 고무 시트를 펼친 단순한 구조를 지닌다. 외관은 기계적이고 단단해 보이지만, 내부에는 가죽 쿠션과 발받침이 결합되어 실용성을 확보한다. 이 작품은 ‘기능주의’라는 이름 아래 묵인된 권력 구조를 직시하며, 루트비히 미스 반 데어 로에에 대한 경의이자 비판을 동시에 드러낸다. 의자를 단순한 기계적 오브제가 아닌, 앉는 행위로 드러나는 사회적 권력 관계의 매개체로 재해석하게 한다. 1960~70년대 이탈리아 급진 디자인의 맥락에서, 디자인 권위에 근본적 질문을 던지는 상징적 작품이다.",
        },
        {
          title: "UP Series Armchair",
          year: "1969",
          company: "Gaetano Pesce / B&B Italia",
          desc: "Gaetano Pesce가 B&B Italia를 위해 발표한 UP Series Armchair는 폴리우레탄 폼을 진공 압축해 PVC 봉투 안에 포장한 뒤, 사용자가 개봉할 때 형태가 부풀어 오르는 혁신적 방식을 도입했다. 일곱 가지 형태로 구성된 이 시리즈는 특히 UP 5_6의 재발매를 통해 소비사회에 대한 풍자를 담아낸다. Pesce는 소비자를 제품 창조의 참여자로 끌어들여, 창작 과정에 직접 관여할 때 비로소 진정한 권리를 회복할 수 있다고 제안한다. 2000년 재발매된 UP 5_6은 대량생산 체제의 경계를 허물고 사용자 경험의 의미를 재정의하는 중요한 전환점이 되었다. 산업 디자인에서 소재와 형식의 한계를 넘어서는 실험적 사례로 평가받는다.",
        },
        {
          title: "100 Chairs in 100 Days",
          year: "2006",
          company: "Martino Gamper",
          desc: "Martino Gamper는 버려진 의자 파편들을 매일 하나씩 이어 붙여 완성하는 ‘100일 동안 100개의 의자’ 프로젝트로 소비와 폐기에 대한 사회적 태도를 문제 삼았다. 각 의자는 과거의 기억과 쓰임새를 재구성하는 일종의 ‘사회적 아카이브’로 기능하며, 무분별한 소비를 비판한다. 2007년 런던 데뷔 이후 세계 각지를 순회 전시하며 전 세계적 명성을 얻었다. 이 프로젝트는 완전함을 추구하는 현대 디자인에 균열을 내고, 불완전성과 수작업의 가치를 강조한다. 일상적 사물을 예술로 전환해 지속 가능성과 재생산 가능성에 대한 깊은 성찰을 관객에게 제공한다.",
        },
        {
          title: "Bombay Bunai Kursi",
          year: "2013",
          company: "Sian Pascale / Young Citizens Design",
          desc: "Sian Pascale이 Young Citizens Design을 통해 한정판으로 선보인 Bombay Bunai Kursi는 인도의 전통 수직 직조 기법을 플라스틱에 적용한 의자다. 전통 공예가 귀족적 디자인 관행을 해체하고, 공예가들의 노동이 소비문화 속에서 어떻게 소외되는지를 은유적으로 드러낸다. 플라스틱 실을 손으로 엮어 만든 강렬한 패턴은 값싼 소재가 지닐 수 있는 미학적·사회적 가치를 재조명한다. 원래 뭄바이의 The Art Loft를 위해 제작된 이 작품은 문화 간 불균형과 노동 착취에 대한 묵시적 비판을 담고 있다. 전통과 현대, 품격과 대중의 경계를 넘나드는 사회비판적 디자인 오브제로 평가된다.",
        },
        {
          title: "Slip Chair",
          year: "2017",
          company: "Daniel Arsham, Alex Mustonen / Snarkitecture",
          desc: "Snarkitecture의 Daniel Arsham과 Alex Mustonen가 UVA 의뢰로 제작한 Slip Chair는 착시 효과를 통해 ‘보이는 것’과 ‘실제 기능’ 사이의 간극을 드러낸다. 흰색 물푸레나무 프레임과 검은색 대리석 판이 대비를 이루며, 한쪽으로 기울어 보이지만 안정적으로 착석이 가능하다. 이 작품은 외형적 이미지에 쉽게 현혹되는 현대 사회를 비판하며, 사회적 신뢰의 취약함을 은유한다. 착시는 단순한 시각 장난을 넘어 가구의 구조적 가능성과 의미를 재고하게 한다. 미술, 건축, 가구 디자인의 경계에서 새로운 탐색을 시도한 전위적 사례다.",
        },

        {
          title: "Branca Chair",

      function getZ(arr, i) {
        return arr.map((_, j) =>
          j === i ? arr.length : arr.length - Math.abs(i - j)
        );
      }

      function display(it, i, act) {
        const z = getZ([...$items], act)[i];
        it.style.setProperty("--zIndex", z);
        it.style.setProperty("--active", (i - act) / $items.length);
        // 필터 적용: 중앙만 선명하게, 나머지는 뿌옇게
        it.style.filter = i === act ? "none" : "blur(4px) brightness(0.7)";
      }

        progress = Math.max(0, Math.min(progress, 100));
        active = Math.floor((progress / 100) * ($items.length - 1));
        $items.forEach((it, i) => display(it, i, active));

        requestAnimationFrame(loop);

          if (i === active) {
            showDetail(i);
          } else {
            progress = (i / $items.length) * 100 + 10;

          startX = e.touches[0].clientX;
        },
        { passive: true }
      );
      document.addEventListener(

        (e) => {
          if (!isDown) return;
          progress += (e.touches[0].clientX - startX) * speedDrag;
          startX = e.touches[0].clientX;

        { passive: true }

    <script>
      const text =
        '"Chairs That Speak" 전시는 의자를 단순한 기능적 도구로 보지 않는다. 이곳에서 의자는 권력, 환경, 계층, 인간성 등 다양한 사회적 이슈를 드러내는 언어이자, 조용한 질문의 수단이다. 각 의자는 시대의 가치관을 반영하며, 관객은 이를 통해 사회를 새롭게 바라보고 성찰하는 기회를 갖게 된다. 의자는 침묵 속에서도 강렬하게 우리에게 말을 건네며, "우린 어떤 사회를 만들고 있는가"  라는 질문을 남긴다.';
      let idx = 0;
      let typedDone = false;

      function typeWriter() {
        if (idx < text.length) {
          document.getElementById("typed-text").textContent += text.charAt(idx);
          idx++;
          setTimeout(typeWriter, 50);
        } else {
          typedDone = true;
          document.getElementById("typed-text").classList.add("cursor");
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        typeWriter();

        document.getElementById("screen0").addEventListener("click", () => {
          document.getElementById("screen0").classList.add("hidden");
          document.getElementById("screen1").classList.remove("hidden");
        });
      });
    </script>
  </body>
</html>
